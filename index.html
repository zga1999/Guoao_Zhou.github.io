<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zhou GuoAo</title>
  <style>
    :root{
      --text:#111;
      --muted:#666;
      --border:#e8e8e8;
      --bg:#fff;
    }
    body{
      max-width: 860px;
      margin: 56px auto;
      padding: 0 18px;
      font-family: Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
    }
    a{ text-decoration: none; color: inherit; }
    a:hover{ text-decoration: underline; }

    .header{
      display:flex;
      align-items:center;
      gap:18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .avatar{
      width: 92px;
      height: 92px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      background: #f6f6f6;
      flex: 0 0 auto;
    }
    h1{
      margin:0;
      font-size: 28px;
      line-height: 1.2;
    }
    .subtitle{
      margin-top:6px;
      color: var(--muted);
      font-size: 14px;
    }

    .section{
      margin-top: 20px;
    }
    .section h2{
      font-size: 16px;
      margin: 0 0 8px 0;
    }

    .meta{
      color: var(--muted);
      font-size: 14px;
      margin: 10px 0 0 0;
    }
    .meta ul{
      margin: 8px 0 0 0;
      padding-left: 18px;
    }
    .meta li{
      margin: 4px 0;
    }

    .card{
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      background: #fff;
    }

    /* 手机适配 */
    @media (max-width: 520px){
      .header{ align-items:flex-start; }
      .avatar{ width: 72px; height: 72px; }
      h1{ font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img class="avatar" src="https://avatars.githubusercontent.com/u/248584472?v=4&s=200" alt="Zhou GuoAo Avatar" />


    <div>
      <h1>Zhou GuoAo</h1>
      <div class="subtitle">Wuhan University of Technology · PhD Student</div>

      <div class="meta">
        <strong>Email</strong>
        <ul>

          <li><a href="mailto:guoaozhou@gmail.com">1464476867@qq.com</a> (Personal)</li>
        </ul>
      </div>
    </div>
  </div>


</body>
</html>
